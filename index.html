<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Document</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles/styles.css"/>
</head>
<body>
    <!-- ШАПКА -->
    <header class="header">
      <div class="container header__inner">
        <a href="#" class="logo">
          <span class="logo_icon"><img src='images/logo.svg'/></span>
          <span class="logo_text">Furniro</span>
        </a>

        <nav class="nav">
          <ul class="nav__list">
            <li><a href="#" class="nav__link">Home</a></li>
            <li><a href="#" class="nav__link">Shop</a></li>
            <li><a href="#" class="nav__link">About</a></li>
            <li><a href="#" class="nav__link">Contact</a></li>
          </ul>
        </nav>

        <div class="header__icons">
          <div class="header__icon"><img src='images/human.svg'/></div>
          <div class="header__icon"><img src='images/search.svg'/></div>
          <div class="header__icon"><img src='images/heart.svg'/></div>
          <div class="header__icon"><img src='images/basket.svg'/></div>
        </div>
      </div>
    </header>

    <section class="hero">
      <div class="container hero__inner">
        <div class="hero__image-wrapper">
          <!-- сюда можно подставить фон -->
          <img
            src="images/new_arrival.jpg"
            alt="Hero"
            class="hero__image"
          />
        </div>

        <div class="hero__banner">
          <div class="hero__eyebrow">New Arrival</div>
          <h1 class="hero__title">Discover Our New Collection</h1>
          <p class="hero__text">
            Lorem ipsum dolor sit amet, consectetur adipiscing elit. Ut elit
            tellus, luctus nec ullamcorper mattis.
          </p>
          <a href="#" class="hero__button">Buy Now</a>
        </div>
      </div>
    </section>
</body>
</html>
